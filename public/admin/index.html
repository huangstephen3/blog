<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Signal Layer Admin</title>
    <style>
      :root {
        color-scheme: dark;
      }

      body {
        margin: 0;
        background: #08131d;
        color: #ecf7ff;
        font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
      }

      .admin-loading {
        display: grid;
        place-items: center;
        min-height: 100vh;
        padding: 2rem;
        text-align: center;
      }

      .admin-loading p {
        max-width: 36rem;
        color: #9cb3c7;
        line-height: 1.7;
      }
    </style>
  </head>
  <body>
    <div class="admin-loading">
      <div>
        <h1>Signal Layer Admin</h1>
        <p>
          The editor is loading. If GitHub login does not complete on GitHub Pages,
          finish the OAuth proxy step described in the repository README.
        </p>
      </div>
    </div>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  </body>
</html>
